name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODE_OF_CONDUCT.md

      - name: Verify skill structure exists
        run: |
          test -d skills
          find skills -maxdepth 2 -name SKILL.md | grep -q SKILL.md
